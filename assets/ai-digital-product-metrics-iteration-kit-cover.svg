<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Digital Product Metrics and Iteration Kit cover</title>
  <desc id="desc">A clean dashboard-style cover for a metrics and iteration worksheet kit.</desc>
  <rect width="1600" height="900" fill="#f7f9fb"/>
  <rect x="120" y="110" width="1360" height="680" rx="28" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <text x="190" y="215" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="700" fill="#111827">AI Digital Product</text>
  <text x="190" y="285" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="700" fill="#111827">Metrics &amp; Iteration Kit</text>
  <text x="194" y="350" font-family="Inter, Arial, sans-serif" font-size="28" fill="#4b5563">Record signals. Choose one reversible change. Avoid fake growth claims.</text>
  <g transform="translate(190 430)">
    <rect width="360" height="210" rx="16" fill="#eef6ff" stroke="#2563eb" stroke-width="3"/>
    <text x="34" y="60" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#1d4ed8">Signal Log</text>
    <line x1="34" y1="95" x2="326" y2="95" stroke="#93c5fd" stroke-width="4"/>
    <line x1="34" y1="130" x2="260" y2="130" stroke="#93c5fd" stroke-width="4"/>
    <line x1="34" y1="165" x2="300" y2="165" stroke="#93c5fd" stroke-width="4"/>
  </g>
  <g transform="translate(620 430)">
    <rect width="360" height="210" rx="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
    <text x="34" y="60" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#15803d">One Change</text>
    <circle cx="72" cy="124" r="34" fill="#bbf7d0" stroke="#16a34a" stroke-width="4"/>
    <path d="M56 124l12 12 24-30" fill="none" stroke="#166534" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="126" y1="110" x2="300" y2="110" stroke="#86efac" stroke-width="5"/>
    <line x1="126" y1="148" x2="260" y2="148" stroke="#86efac" stroke-width="5"/>
  </g>
  <g transform="translate(1050 430)">
    <rect width="360" height="210" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
    <text x="34" y="60" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#c2410c">Claim Check</text>
    <path d="M70 155h220L180 84z" fill="#fed7aa" stroke="#f97316" stroke-width="4"/>
    <text x="172" y="143" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="700" text-anchor="middle" fill="#9a3412">!</text>
  </g>
  <text x="190" y="720" font-family="Inter, Arial, sans-serif" font-size="25" fill="#374151">Templates, prompts, and worksheets for solo digital product sellers</text>
